<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HKDSE ApL(C) 知識挑戰 | NCS 融學平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-indigo-50 font-sans text-gray-800 min-h-screen flex flex-col">

    <nav class="bg-indigo-600 text-white shadow-md">
        <div class="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="student.html" class="flex items-center space-x-2 hover:text-indigo-200 transition">
                <i class="fa-solid fa-arrow-left"></i>
                <span class="font-bold text-sm">返回學生專區</span>
            </a>
            <div class="font-bold text-lg"><i class="fa-solid fa-clipboard-check mr-2"></i>ApL(C) Quiz</div>
        </div>
    </nav>

    <main class="flex-grow max-w-3xl mx-auto px-4 py-8 w-full flex flex-col justify-center">
        <div id="quiz-container" class="bg-white rounded-2xl shadow-xl p-6 md:p-8 fade-in relative">
            
            <!-- Progress -->
            <div class="flex justify-between text-sm font-bold text-indigo-500 mb-4">
                <span id="progress-text">Question 1 / 20</span>
                <span id="score-text">Score: 0</span>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-2 mb-8">
                <div id="progress-bar" class="bg-indigo-600 h-2 rounded-full transition-all duration-300" style="width: 5%"></div>
            </div>

            <!-- Question -->
            <div class="mb-8">
                <div class="flex items-start">
                    <h2 id="q-zh" class="text-xl md:text-2xl font-bold text-gray-900 mb-2">載入中...</h2>
                    <button onclick="speakText(document.getElementById('q-zh').innerText, 'zh-HK')" class="ml-3 text-indigo-500 hover:text-indigo-700 bg-indigo-50 p-2 rounded-full focus:outline-none"><i class="fa-solid fa-volume-up"></i></button>
                </div>
                <div class="flex items-start mt-2">
                    <p id="q-en" class="text-sm md:text-base text-gray-500 italic">Loading...</p>
                    <button onclick="speakText(document.getElementById('q-en').innerText, 'en-GB')" class="ml-3 text-gray-400 hover:text-gray-600 bg-gray-50 p-2 rounded-full text-xs focus:outline-none"><i class="fa-solid fa-volume-up"></i></button>
                </div>
            </div>

            <!-- Options -->
            <div id="options-container" class="space-y-3">
                <!-- Buttons injected by JS -->
            </div>

            <!-- Feedback -->
            <div id="feedback-container" class="hidden mt-6 p-4 rounded-xl">
                <h3 id="feedback-title" class="font-bold text-lg mb-1"></h3>
                <div class="flex items-start mt-2">
                    <p id="feedback-zh" class="text-sm font-medium text-gray-800"></p>
                    <button onclick="speakText(document.getElementById('feedback-zh').innerText, 'zh-HK')" class="ml-2 text-indigo-500 hover:text-indigo-700 focus:outline-none"><i class="fa-solid fa-volume-up text-sm"></i></button>
                </div>
                <p id="feedback-en" class="text-xs text-gray-600 italic mt-1"></p>
            </div>

            <!-- Next Button -->
            <button id="next-btn" onclick="nextQuestion()" class="hidden w-full mt-6 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl transition shadow-md">
                下一題 Next Question <i class="fa-solid fa-arrow-right ml-2"></i>
            </button>
        </div>

        <!-- Result Screen -->
        <div id="result-container" class="hidden bg-white rounded-2xl shadow-xl p-8 text-center fade-in">
            <div class="text-indigo-500 text-6xl mb-4"><i class="fa-solid fa-award"></i></div>
            <h2 class="text-3xl font-bold text-gray-900 mb-2">測驗完成 Quiz Completed!</h2>
            <p class="text-lg text-gray-600 mb-6">Your score is <span id="final-score" class="font-bold text-indigo-600 text-2xl"></span> / 20</p>
            <button onclick="location.reload()" class="bg-indigo-600 text-white px-6 py-3 rounded-full font-bold hover:bg-indigo-700 transition">重新測試 Restart</button>
            <a href="student.html" class="block mt-4 text-indigo-500 hover:underline">返回首頁 Return Home</a>
        </div>
    </main>

    <script>
        const questions = [
            {
                zh: "ApL(C) 課程主要是為哪一類學生設計的？", en: "Which group of students is the ApL(C) course primarily designed for?",
                options: [
                    { zh: "母語為中文的本地學生", en: "Local students whose mother tongue is Chinese", correct: false },
                    { zh: "在香港就讀的非華語學生", en: "Non-Chinese speaking (NCS) students studying in Hong Kong", correct: true },
                    { zh: "準備去外國留學的學生", en: "Students preparing to study abroad", correct: false },
                    { zh: "成年新移民", en: "Adult new immigrants", correct: false }
                ],
                exp_zh: "ApL(C) 是專為非華語學生提供的替代中文資歷，幫助他們升學及就業。", exp_en: "ApL(C) is an alternative Chinese qualification specifically designed for NCS students for further studies and career pursuits."
            },
            {
                zh: "ApL(C) 課程的評估模式是怎樣的？", en: "What is the assessment mode for the ApL(C) course?",
                options: [
                    { zh: "只有一個期末公開筆試", en: "Only one final public written exam", correct: false },
                    { zh: "100% 由課程提供機構進行持續評估", en: "100% continuous assessment by the course provider", correct: true },
                    { zh: "50% 持續評估，50% 考評局筆試", en: "50% continuous assessment, 50% HKEAA written exam", correct: false },
                    { zh: "只需交一篇畢業論文", en: "Only need to submit a graduation thesis", correct: false }
                ],
                exp_zh: "ApL(C) 沒有公開考試，成績完全基於機構（如 VTC）在課堂上的持續評估。", exp_en: "ApL(C) has no public exam; results are based entirely on continuous assessments by the provider (e.g., VTC) during classes."
            },
            {
                zh: "在 HKDSE 證書上，ApL(C) 最基本的及格成績稱為什麼？", en: "What is the basic passing grade for ApL(C) on the HKDSE certificate called?",
                options: [
                    { zh: "Level 1", en: "Level 1", correct: false },
                    { zh: "及格 (Pass)", en: "Pass", correct: false },
                    { zh: "達標 (Attained)", en: "Attained", correct: true },
                    { zh: "滿意 (Satisfactory)", en: "Satisfactory", correct: false }
                ],
                exp_zh: "ApL(C) 成績分為「達標」、「達標並表現優異(I)」及「達標並表現優異(II)」。", exp_en: "ApL(C) results are reported as 'Attained', 'Attained with Distinction (I)', and 'Attained with Distinction (II)'."
            },
            {
                zh: "ApL(C) 的「達標」(Attained) 成績，等同於 HKDSE 中文科的哪個級別？", en: "The 'Attained' result in ApL(C) is accepted as equivalent to which level of the HKDSE Chinese subject?",
                options: [
                    { zh: "第一級 (Level 1)", en: "Level 1", correct: false },
                    { zh: "第二級 (Level 2)", en: "Level 2", correct: true },
                    { zh: "第三級 (Level 3)", en: "Level 3", correct: false },
                    { zh: "第四級 (Level 4)", en: "Level 4", correct: false }
                ],
                exp_zh: "教育局和公務員事務局接受「達標」等同於 DSE 中文科第二級。", exp_en: "The EDB and Civil Service Bureau accept 'Attained' as equivalent to Level 2 in DSE Chinese."
            },
            {
                zh: "在資歷架構 (QF) 下，ApL(C) 課程等同於哪一個級別的證書？", en: "Under the Qualifications Framework (QF), which level of certificate is the ApL(C) course equivalent to?",
                options: [
                    { zh: "資歷架構第一至第二級", en: "QF Level 1 to Level 2", correct: false },
                    { zh: "資歷架構第一至第三級", en: "QF Level 1 to Level 3", correct: true },
                    { zh: "資歷架構第四級", en: "QF Level 4", correct: false },
                    { zh: "不獲資歷架構認可", en: "Not recognized by QF", correct: false }
                ],
                exp_zh: "視乎學生的最終成績，ApL(C) 可銜接資歷架構的第一、第二或最高第三級證書。", exp_en: "Depending on the student's final result, ApL(C) is articulated to QF Level 1, Level 2, or up to Level 3 certificate."
            },
            {
                zh: "ApL(C) 的上課總時數大約是多少？", en: "What is the approximate total number of contact hours for an ApL(C) course?",
                options: [
                    { zh: "100 小時", en: "100 hours", correct: false },
                    { zh: "180 小時", en: "180 hours", correct: false },
                    { zh: "270 小時", en: "270 hours", correct: true },
                    { zh: "400 小時", en: "400 hours", correct: false }
                ],
                exp_zh: "課程通常橫跨中四至中六，總學習時數約為 270 小時。", exp_en: "The course usually spans from Secondary 4 to 6, with a total of around 270 learning hours."
            },
            {
                zh: "大學聯招 (JUPAS) 接受 ApL(C) 成績作為入學的中文要求嗎？", en: "Does JUPAS accept ApL(C) results to meet the Chinese language requirement for admission?",
                options: [
                    { zh: "完全不接受", en: "Completely not accepted", correct: false },
                    { zh: "只接受達標並表現優異", en: "Only accept Attained with Distinction", correct: false },
                    { zh: "接受，大部分院校認可作為替代中文資歷", en: "Yes, most institutions recognize it as an Alternative Chinese Language Qualification", correct: true },
                    { zh: "只適用於副學士課程", en: "Only applicable to Associate Degree programmes", correct: false }
                ],
                exp_zh: "教資會資助大學普遍接受 ApL(C) 作為 NCS 學生的基本替代中文入學條件。", exp_en: "UGC-funded universities generally accept ApL(C) as a basic alternative Chinese admission requirement for NCS students."
            },
            {
                zh: "ApL(C) 課程的內容設計主要圍繞哪些情境？", en: "What contexts are the ApL(C) course contents mainly designed around?",
                options: [
                    { zh: "中國文學與古典詩詞", en: "Chinese literature and classical poetry", correct: false },
                    { zh: "服務業、商業及實用生活", en: "Services, commerce, and practical daily life", correct: true },
                    { zh: "歷史與哲學", en: "History and philosophy", correct: false },
                    { zh: "科學研究與工程", en: "Scientific research and engineering", correct: false }
                ],
                exp_zh: "應用學習強調實用性，因此圍繞職場（如款待、零售）及日常溝通。", exp_en: "Applied Learning emphasizes practicality, focusing on workplace (e.g., hospitality, retail) and daily communication."
            },
            {
                zh: "如果學生取得「達標並表現優異(II)」，等同 DSE 中文科的哪個級別？", en: "If a student gets 'Attained with Distinction (II)', what is the equivalent level in DSE Chinese?",
                options: [
                    { zh: "第三級 (Level 3)", en: "Level 3", correct: false },
                    { zh: "第四級或以上 (Level 4 or above)", en: "Level 4 or above", correct: true },
                    { zh: "第五級 (Level 5)", en: "Level 5", correct: false },
                    { zh: "第二級 (Level 2)", en: "Level 2", correct: false }
                ],
                exp_zh: "自 2018 年起，優異(II) 大致等同 DSE 第四級或以上的表現。", exp_en: "Since 2018, Distinction (II) is broadly comparable to Level 4 or above in the DSE."
            },
            {
                zh: "合資格的非華語學生修讀 ApL(C) 需要繳交多少學費？", en: "How much tuition fee do eligible NCS students need to pay for taking ApL(C)?",
                options: [
                    { zh: "$10,000", en: "$10,000", correct: false },
                    { zh: "$5,000", en: "$5,000", correct: false },
                    { zh: "半價收費", en: "Half price", correct: false },
                    { zh: "全額資助，學生免費", en: "Fully funded, free for students", correct: true }
                ],
                exp_zh: "教育局會全額資助合資格中學生的 ApL(C) 課程費用。", exp_en: "The EDB fully subsidizes the course fees of ApL(C) for eligible secondary school students."
            },
            { zh: "教育局對報讀 ApL(C) 的「非華語」定義中，學生接受以中文為教學語言的教育不能超過多少年？", en: "Under EDB's definition of NCS for ApL(C), a student must not have received education with Chinese as the medium of instruction for more than how many years?", options: [{zh: "三年", en: "3 years", correct: false}, {zh: "六年", en: "6 years", correct: true}, {zh: "九年", en: "9 years", correct: false}, {zh: "沒有限制", en: "No limit", correct: false}], exp_zh: "學生在過去接受中小學教育期間，在「以中文為教學語言」的學校就讀不能超過六年。", exp_en: "The student must have received education in schools using Chinese as the medium of instruction for not more than 6 years." },
            { zh: "考評局 (HKEAA) 如何監控機構的持續評估分數？", en: "How does HKEAA monitor the continuous assessment scores given by the providers?", options: [{zh: "完全信任機構，不作干預", en: "Trust providers completely, no intervention", correct: false}, {zh: "抽樣審核並進行分數調整 (Moderation)", en: "Sample moderation and score adjustment", correct: true}, {zh: "派員到課堂監考", en: "Send staff to invigilate in class", correct: false}, {zh: "要求學生額外參加全港統一面試", en: "Require students to take an extra territory-wide interview", correct: false}], exp_zh: "考評局會檢視學生課業樣本進行 Moderation，以確保不同機構的評分標準一致。", exp_en: "HKEAA moderates sample student work to ensure grading standards are consistent across different providers." },
            { zh: "ApL(C) 課程要求學生達到多少出席率才能獲發成績？", en: "What is the attendance rate requirement for students to receive a result in ApL(C)?", options: [{zh: "50%", en: "50%", correct: false}, {zh: "70%", en: "70%", correct: false}, {zh: "80%", en: "80%", correct: true}, {zh: "100%", en: "100%", correct: false}], exp_zh: "大部分機構要求最低 80% 的出席率。", exp_en: "Most providers require a minimum attendance rate of 80%." },
            { zh: "ApL(C) 屬於 HKDSE 科目架構中的哪一類？", en: "Which category does ApL(C) belong to in the HKDSE subject framework?", options: [{zh: "甲類 (核心及選修科目)", en: "Category A (Core and Elective)", correct: false}, {zh: "乙類 (應用學習科目)", en: "Category B (Applied Learning)", correct: true}, {zh: "丙類 (其他語言科目)", en: "Category C (Other Languages)", correct: false}, {zh: "丁類 (特殊教育)", en: "Category D (Special Ed)", correct: false}], exp_zh: "所有應用學習科目均屬於 HKDSE 乙類科目。", exp_en: "All Applied Learning subjects are under Category B of HKDSE." },
            { zh: "學生通常在什麼階段開始修讀 ApL(C)？", en: "At what stage do students usually start taking ApL(C)?", options: [{zh: "中一", en: "Secondary 1", correct: false}, {zh: "中四", en: "Secondary 4", correct: true}, {zh: "中六", en: "Secondary 6", correct: false}, {zh: "大學一年級", en: "University Year 1", correct: false}], exp_zh: "課程一般從中四開始，為期三年。", exp_en: "The course generally starts in Secondary 4 and lasts for three years." },
            { zh: "ApL(C) 的教學語言有什麼特別之處？", en: "What is special about the medium of instruction for ApL(C)?", options: [{zh: "只限用全普通話", en: "Strictly Putonghua only", correct: false}, {zh: "可輔以英語或學生的母語解釋困難概念", en: "Can be supplemented by English or student's mother tongue for difficult concepts", correct: true}, {zh: "必須全英語授課", en: "Must be entirely in English", correct: false}, {zh: "禁止使用任何外語", en: "Foreign languages are strictly forbidden", correct: false}], exp_zh: "為確保學生理解實用情境，導師可靈活運用輔助語言。", exp_en: "Instructors can flexibly use supplementary languages to ensure students understand practical contexts." },
            { zh: "哪間機構是目前提供 ApL(C) 課程的主要提供者之一？", en: "Which institution is one of the main providers of the ApL(C) course currently?", options: [{zh: "職業訓練局 (VTC)", en: "Vocational Training Council (VTC)", correct: true}, {zh: "香港紅十字會", en: "Hong Kong Red Cross", correct: false}, {zh: "醫院管理局", en: "Hospital Authority", correct: false}, {zh: "消費者委員會", en: "Consumer Council", correct: false}], exp_zh: "VTC 及部分大專院校是教育局委託的常見課程提供者。", exp_en: "VTC and some tertiary institutions are common course providers commissioned by EDB." },
            { zh: "如果非華語學生同時擁有 ApL(C) 和 GCSE 中文成績，大學聯招 (JUPAS) 會如何處理？", en: "If an NCS student has both ApL(C) and GCSE Chinese results, how will JUPAS handle it?", options: [{zh: "兩者分數相加", en: "Add the scores together", correct: false}, {zh: "只計算 ApL(C)", en: "Only count ApL(C)", correct: false}, {zh: "彈性考慮並取其對學生最有利的成績", en: "Flexibly consider and take the best result for the student", correct: true}, {zh: "取消其申請資格", en: "Disqualify the application", correct: false}], exp_zh: "大學在處理替代中文資歷時，通常會取最高或最有利的成績計算。", exp_en: "Universities usually take the highest or most favorable alternative Chinese qualification." },
            { zh: "與其他 DSE 核心中文科相比，ApL(C) 最大特點是？", en: "Compared to core DSE Chinese, what is the biggest feature of ApL(C)?", options: [{zh: "需要背誦大量文言文", en: "Requires memorizing many classical texts", correct: false}, {zh: "重視職場與日常真實溝通，而非學術鑒賞", en: "Focuses on real workplace/daily communication rather than academic appreciation", correct: true}, {zh: "寫作字數要求達二千字", en: "Requires 2000-word essays", correct: false}, {zh: "只有聽力測試", en: "Only tests listening", correct: false}], exp_zh: "ApL(C) 完全切合生活與職業需求，減輕了文學分析的壓力。", exp_en: "ApL(C) perfectly fits life and career needs, reducing the pressure of literary analysis." },
            { zh: "ApL(C) 的「達標並表現優異(I)」等同 HKDSE 中文科的哪一級別？", en: "What is 'Attained with Distinction (I)' in ApL(C) equivalent to in HKDSE Chinese?", options: [{zh: "第二級 (Level 2)", en: "Level 2", correct: false}, {zh: "第三級 (Level 3)", en: "Level 3", correct: true}, {zh: "第四級 (Level 4)", en: "Level 4", correct: false}, {zh: "第五級 (Level 5)", en: "Level 5", correct: false}], exp_zh: "優異(I) 成績獲公認等同於 DSE 中文科第三級表現。", exp_en: "Distinction (I) is widely recognized as equivalent to Level 3 performance in DSE Chinese." }
        ];

        let currentQuestion = 0;
        let score = 0;

        function speakText(text, lang) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = lang;
            window.speechSynthesis.speak(utterance);
        }

        function loadQuestion() {
            document.getElementById('feedback-container').classList.add('hidden');
            document.getElementById('next-btn').classList.add('hidden');
            
            const q = questions[currentQuestion];
            document.getElementById('q-zh').innerText = q.zh;
            document.getElementById('q-en').innerText = q.en;
            document.getElementById('progress-text').innerText = `Question ${currentQuestion + 1} / ${questions.length}`;
            document.getElementById('progress-bar').style.width = `${((currentQuestion + 1) / questions.length) * 100}%`;

            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            
            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'w-full text-left bg-gray-50 border-2 border-gray-200 hover:border-indigo-400 hover:bg-indigo-50 rounded-xl p-4 transition duration-200 group';
                btn.innerHTML = `
                    <div class="font-bold text-gray-800 text-lg group-hover:text-indigo-700">${opt.zh}</div>
                    <div class="text-sm text-gray-500 italic mt-1 group-hover:text-indigo-500">${opt.en}</div>
                `;
                btn.onclick = () => selectOption(opt, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function selectOption(selectedOpt, btnElement) {
            // Disable all buttons
            const allBtns = document.getElementById('options-container').children;
            for(let b of allBtns) { b.disabled = true; b.classList.remove('hover:border-indigo-400', 'hover:bg-indigo-50', 'cursor-pointer'); }

            const feedback = document.getElementById('feedback-container');
            const q = questions[currentQuestion];

            if(selectedOpt.correct) {
                btnElement.classList.add('border-green-500', 'bg-green-50');
                document.getElementById('feedback-title').innerText = '✅ 正確 Correct!';
                document.getElementById('feedback-title').className = 'font-bold text-lg mb-1 text-green-600';
                feedback.className = 'mt-6 p-4 rounded-xl bg-green-50 border border-green-200 block fade-in';
                score++;
                document.getElementById('score-text').innerText = `Score: ${score}`;
            } else {
                btnElement.classList.add('border-red-500', 'bg-red-50');
                // Find correct one and highlight
                for(let b of allBtns) {
                    if(q.options.find(o => o.zh === b.querySelector('.font-bold').innerText).correct) {
                        b.classList.add('border-green-500', 'bg-green-50');
                    }
                }
                document.getElementById('feedback-title').innerText = '❌ 不正確 Incorrect';
                document.getElementById('feedback-title').className = 'font-bold text-lg mb-1 text-red-600';
                feedback.className = 'mt-6 p-4 rounded-xl bg-red-50 border border-red-200 block fade-in';
            }

            document.getElementById('feedback-zh').innerText = q.exp_zh;
            document.getElementById('feedback-en').innerText = q.exp_en;
            document.getElementById('next-btn').classList.remove('hidden');
        }

        function nextQuestion() {
            currentQuestion++;
            if(currentQuestion < questions.length) {
                loadQuestion();
            } else {
                document.getElementById('quiz-container').classList.add('hidden');
                document.getElementById('result-container').classList.remove('hidden');
                document.getElementById('final-score').innerText = score;
            }
        }

        window.onload = loadQuestion;
    </script>
</body>
</html>
